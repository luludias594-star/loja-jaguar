<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onça — Domine as Ruas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="assets/logo-onça.png" alt="Logo Onça">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="camisetas.html">Camisetas</a></li>
                <li><a href="lancamentos.html">Lançamentos</a></li>
                <li><a href="produtos.html">Feminino</a></li>
                <li><a href="tenis.html">Tênis</a></li>
                <li><a href="ofertas.html">Ofertas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </nav>

        <div class="icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-heart"></i>
            <div class="cart" id="cartIcon" onclick="window.location.href='checkout.html'">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="assets/modelos.png" alt="Modelos usando a marca" class="hero-image">
        <div class="hero-overlay">
            <h1 class="hero-titulo">Domine as Ruas</h1>
            <p class="hero-sub">Estilo selvagem. Atitude única.</p>
            <a href="camisetas.html" class="hero-btn">Ver coleção</a>
        </div>
    </main>

    <!-- Modal do carrinho lateral -->
    <div id="carrinhoSidebar" class="carrinho-sidebar">
        <div class="sidebar-header">
            <h3>Meu Carrinho</h3>
            <span id="fecharSidebar"><i class="fa-solid fa-xmark"></i></span>
        </div>
        <div id="carrinhoItens" class="carrinho-itens"></div>
        <div class="sidebar-footer">
            <div class="sidebar-total">
                <span>Total:</span>
                <span id="totalCarrinho">R$ 0,00</span>
            </div>
            <button onclick="window.location.href='checkout.html'" class="btn-finalizar">Finalizar compra</button>
        </div>
    </div>
    <div id="overlay" class="overlay-sidebar" onclick="fecharCarrinho()"></div>

    <script src="script.js"></script>
</body>

</html>
