<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <header class="navbar">
        <div class="logo">
            <img src="assets/logo-onça.png" alt="Logo Onça">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="camisetas.html">Camisetas</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="lancamentos.html">Lançamentos</a></li>
                <li><a href="tenis.html">Tênis</a></li>
                <li><a href="ofertas.html">Ofertas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>

        <div class="icons">
            <!-- busca inline - expande ao clicar na lupa -->
            <div class="busca-wrap" id="buscaWrap">
                <input type="text" id="campoBusca" class="campo-busca" placeholder="Buscar produtos...">
                <i class="fa-solid fa-xmark busca-fechar" id="buscaFechar" onclick="fecharBusca()"></i>
                <!-- ícone de fechar busca -->
            </div>
            <i class="fa-solid fa-magnifying-glass" id="btnBusca" onclick="toggleBusca()" title="Buscar"></i>
            <!-- ícone de usuário - abre modal de login -->
            <i class="fa-regular fa-user" id="btnLogin" onclick="abrirLogin()" title="Entrar"></i>
            <i class="fa-regular fa-heart"></i>
            <div class="cart" id="cartIcon" onclick="window.location.href='checkout.html'">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>

        </div>

        <!-- BOTÃO HAMBURGUER -->
        <div class="menu-toggle" id="menuToggle" onclick="toggleMenuMobile()    ">
            <span></span>
            <span></span>
            <span></span>
    </header>

</head>

<body>

    <header>
        <h1>Contato</h1>
    </header>

    <section class="container">
        <form onsubmit="enviarMensagem(event)">
            <input type="text" placeholder="Seu nome" required>
            <input type="email" placeholder="Seu email" required>
            <textarea placeholder="Sua mensagem" required></textarea>

            <button type="submit">Enviar</button>
        </form>

    </section>

    <script src="script.js"></script>
</body>

</html>

<script>
    function voltarHome() {
        window.location.href = "index.html";
    }

    function enviarMensagem(event) {
        event.preventDefault();
        alert("Mensagem enviada com sucesso!");
    }
</script>
